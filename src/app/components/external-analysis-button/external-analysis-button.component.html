@if (!drugstoneConfig.config.showAdvAnalysisContent || !hidden) {
  <div class="field">
    <div class="control">
      @if (enabled) {
        <a
          (click)="callback()"
          target="_blank"
          [ngClass]="{ 'text-small': drugstoneConfig.smallStyle }"
          class="button is-primary is-fullwidth is-rounded has-tooltip"
          [pTooltip]="tooltipEnabled"
      [tooltipStyleClass]="
                      'drgstn drgstn-tooltip drgstn-tooltip-top'
                    "
          tooltipPosition="top"
          >
          <app-fa-solid-icon
            classString="first-item-in-button"
            icon="external-link-alt"
          ></app-fa-solid-icon>
          <span
            [ngClass]="{ 'text-small': drugstoneConfig.smallStyle }"
            >
            {{label}}
          </span>
        </a>
      }
      @if (!enabled) {
        <a
          disabled
          [ngClass]="{ 'text-small': drugstoneConfig.smallStyle }"
          class="button is-primary is-fullwidth is-rounded has-tooltip"
          [pTooltip]="tooltipDisabled"
      [tooltipStyleClass]="
                      'drgstn drgstn-tooltip drgstn-tooltip-top'
                    "
          tooltipPosition="top"
          >
          <app-fa-solid-icon
            icon="external-link-alt"
            classString="first-item-in-button"
          ></app-fa-solid-icon>
          <span
            [ngClass]="{ 'text-small': drugstoneConfig.smallStyle }"
            >
            {{label}}
          </span>
        </a>
      }
    </div>
  </div>
}
